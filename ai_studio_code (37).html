<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي التقدم</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --bg-color: #f1f5f9; --white: #ffffff; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg-color); 
            margin: 0; padding: 0; 
            direction: rtl; 
            background-size: cover;
        }

        /* حاوية التطبيق الرئيسية */
        .container { 
            max-width: 100%; 
            min-height: 100vh; 
            background: rgba(255, 255, 255, 0.95); 
            margin: 0 auto; 
            padding: 15px; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* لوحة التحكم (الإعدادات) */
        #settings-panel { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: white; 
            z-index: 9999; overflow-y: auto; padding: 15px; 
            box-sizing: border-box; 
        }

        /* الأزرار العلوية */
        .top-nav { display: flex; gap: 10px; margin-bottom: 15px; justify-content: flex-start; }
        .nav-btn { 
            background: white; border: 2px solid #ddd; 
            padding: 10px; border-radius: 10px; cursor: pointer; 
        }

        /* لوحة النقاط - متجاوبة مع الجوال */
        .scoreboard { 
            display: flex; justify-content: space-around; 
            gap: 10px; margin-bottom: 15px; 
        }
        .team-box { 
            flex: 1; padding: 10px; border-radius: 15px; 
            border: 3px solid #e2e8f0; text-align: center; 
            background: white; font-size: 0.9em;
        }
        .active-team { border-color: var(--accent); background: #eff6ff; }
        .score-num { font-size: 2.5em; font-weight: bold; display: block; }
        .team-logo-game { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }

        /* المؤقت */
        .timer-wrapper { 
            position: relative; width: 80px; height: 80px; margin: 10px auto; 
        }
        #timer-text { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); font-size: 1.5em; font-weight: bold; 
        }

        /* الأسئلة والخيارات */
        .q-card { 
            text-align: center; padding: 15px; 
            background: #fff; border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        #q-txt { font-size: 1.4em; margin-bottom: 20px; min-height: 60px; line-height: 1.3; }
        .btn-opt { 
            background: #f8fafc; border: 2px solid #cbd5e1; 
            padding: 15px; border-radius: 12px; font-size: 1.1em; 
            width: 100%; margin-bottom: 10px; cursor: pointer; font-weight: bold; 
        }
        .correct { background: #22c55e !important; color: white; }
        .wrong { background: #ef4444 !important; color: white; }

        /* أزرار التحكم السفلى */
        .controls { 
            margin-top: auto; display: flex; 
            flex-wrap: wrap; justify-content: center; gap: 5px; 
            padding: 10px 0;
        }
        .btn-ctrl { 
            padding: 10px 15px; border-radius: 8px; 
            border: none; color: white; font-weight: bold; cursor: pointer; 
        }

        /* تنسيقات إضافية للجوال */
        input[type="text"], input[type="number"] { 
            width: 100%; padding: 10px; margin: 5px 0; 
            border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;
        }
        .tab-btn { padding: 8px 12px; margin: 2px; border-radius: 5px; border: none; background: #ddd; }
        .tab-btn.active { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <button class="nav-btn" onclick="toggleSettings()">⚙️ الإعدادات</button>
        <button class="nav-btn" onclick="location.reload()">🏠 الرئيسية</button>
    </div>

    <!-- شاشة البداية -->
    <div id="screen-start" style="text-align:center; padding-top:20px;">
        <h1 id="d-comp-n" style="font-size:2em;">تحدي التقدم</h1>
        <img id="d-l" style="max-height:120px; margin:15px auto; display:none;">
        
        <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin:20px 0;">
            <div><img id="d-t1-l" class="team-logo-game"><h3 id="d-t1-n">فريق 1</h3></div>
            <div style="font-size:1.5em; font-weight:bold;">VS</div>
            <div><img id="d-t2-l" class="team-logo-game"><h3 id="d-t2-n">فريق 2</h3></div>
        </div>
        
        <button onclick="startApp()" style="padding:15px 50px; background:var(--primary); color:white; border-radius:15px; font-size:1.3em; border:none; width:80%;">ابدأ الآن 🚀</button>
    </div>

    <!-- شاشة اللعب -->
    <div id="screen-game" style="display:none;">
        <div class="scoreboard">
            <div id="box1" class="team-box"><h3 id="n1">ف1</h3><span id="sc1" class="score-num">0</span></div>
            <div id="box2" class="team-box"><h3 id="n2">ف2</h3><span id="sc2" class="score-num">0</span></div>
        </div>

        <div class="timer-wrapper">
            <svg style="transform: rotate(-90deg); width:80px; height:80px;">
                <circle cx="40" cy="40" r="35" fill="none" stroke="#eee" stroke-width="5"></circle>
                <circle id="timer-bar" cx="40" cy="40" r="35" fill="none" stroke="var(--accent)" stroke-width="5" stroke-dasharray="220" stroke-dashoffset="0"></circle>
            </svg>
            <div id="timer-text">0</div>
        </div>

        <div class="q-card">
            <h2 id="q-txt">السؤال يظهر هنا</h2>
            <div id="opt-a"></div>
        </div>

        <div class="controls">
            <button class="btn-ctrl" id="pBtn" onclick="tP()" style="background:#f59e0b;">⏸ إيقاف</button>
            <button class="btn-ctrl" onclick="aSM()" style="background:#8b5cf6;">⚡ سرعة</button>
            <button class="btn-ctrl" onclick="location.reload()" style="background:#475569;">🔄 خروج</button>
        </div>
    </div>
</div>

<!-- لوحة الإعدادات -->
<div id="settings-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>⚙️ إعدادات المسابقة</h3>
        <button onclick="toggleSettings()" style="background:red; color:white; border:none; padding:8px; border-radius:5px;">إغلاق X</button>
    </div>
    
    <div style="margin:10px 0; text-align:center;">
        <button class="tab-btn" id="slot-1" onclick="switchSlot(1)">مسابقة 1</button>
        <button class="tab-btn" id="slot-2" onclick="switchSlot(2)">مسابقة 2</button>
        <button class="tab-btn" id="slot-3" onclick="switchSlot(3)">مسابقة 3</button>
    </div>

    <input type="text" id="s-comp" placeholder="اسم المسابقة">
    <input type="text" id="s-t1" placeholder="اسم الفريق الأول">
    <input type="text" id="s-t2" placeholder="اسم الفريق الثاني">
    <input type="number" id="s-time" placeholder="وقت السؤال (ثانية)">
    <input type="number" id="s-count" placeholder="عدد الأسئلة">
    
    <hr>
    <h4>الشعارات:</h4>
    شعار المسابقة: <input type="file" id="f-l">
    شعار فريق 1: <input type="file" id="f-t1">
    شعار فريق 2: <input type="file" id="f-t2">
    الخلفية: <input type="file" id="f-bg">
    
    <div style="text-align:center; margin-top:20px;">
        <button onclick="saveAll()" style="background:green; color:white; padding:15px; width:100%; border-radius:10px; border:none; font-size:1.2em;">حفظ التعديلات ✅</button>
    </div>
</div>

<script>
// المنطق البرمجي (تم تبسيطه ليعمل بكفاءة على المتصفحات المحولة لتطبيقات)
let curSl = 1, appD = {}, sc1 = 0, sc2 = 0, turn = 0, tmInt, tmLeft, isP = false;

function loadSl(n) {
    curSl = n;
    let saved = localStorage.getItem(`app_v7_slot_${n}`);
    if(saved) appD = JSON.parse(saved);
    else {
        appD = { compName:"مسابقة جديدة", t1Name:"فريق 1", t2Name:"فريق 2", qsPerTeam:5, totalTime:20, t1QS:[], t2QS:[], media:{} };
        for(let i=0; i<5; i++){
            appD.t1QS.push({q:`سؤال ف1 رقم ${i+1}`, opts:["أ","ب","ج","د"], ok:0});
            appD.t2QS.push({q:`سؤال ف2 رقم ${i+1}`, opts:["أ","ب","ج","د"], ok:0});
        }
    }
    syncUI();
}

function syncUI() {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`slot-${curSl}`).classList.add('active');
    document.getElementById('s-comp').value = document.getElementById('d-comp-n').innerText = appD.compName;
    document.getElementById('s-t1').value = appD.t1Name;
    document.getElementById('s-t2').value = appD.t2Name;
    document.getElementById('s-time').value = appD.totalTime;
    document.getElementById('s-count').value = appD.qsPerTeam;
    if(appD.media.bg) document.body.style.backgroundImage = `url(${appD.media.bg})`;
    if(appD.media.lL) { document.getElementById('d-l').src = appD.media.lL; document.getElementById('d-l').style.display='block'; }
}

async function saveAll() {
    appD.compName = document.getElementById('s-comp').value;
    appD.t1Name = document.getElementById('s-t1').value;
    appD.t2Name = document.getElementById('s-t2').value;
    appD.totalTime = parseInt(document.getElementById('s-time').value);
    appD.qsPerTeam = parseInt(document.getElementById('s-count').value);
    
    const toB64 = f => new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload=()=>r(rd.result); });
    if(document.getElementById('f-l').files[0]) appD.media.lL = await toB64(document.getElementById('f-l').files[0]);
    if(document.getElementById('f-bg').files[0]) appD.media.bg = await toB64(document.getElementById('f-bg').files[0]);

    localStorage.setItem(`app_v7_slot_${curSl}`, JSON.stringify(appD));
    alert("تم الحفظ ✅");
    location.reload();
}

function startApp() {
    document.getElementById('screen-start').style.display='none';
    document.getElementById('screen-game').style.display='block';
    document.getElementById('n1').innerText = appD.t1Name;
    document.getElementById('n2').innerText = appD.t2Name;
    nextTurn();
}

function nextTurn() {
    if(turn >= appD.qsPerTeam * 2) { finish(); return; }
    let isT1 = turn % 2 === 0;
    document.getElementById('box1').className = isT1 ? 'team-box active-team' : 'team-box';
    document.getElementById('box2').className = !isT1 ? 'team-box active-team' : 'team-box';
    showQuestion(isT1);
}

function showQuestion(isT1) {
    let q = (isT1 ? appD.t1QS : appD.t2QS)[Math.floor(turn/2)];
    document.getElementById('q-txt').innerText = q.q;
    let area = document.getElementById('opt-a');
    area.innerHTML = '';
    q.opts.forEach((o, i) => {
        let b = document.createElement('button');
        b.className = 'btn-opt'; b.innerText = o;
        b.onclick = () => {
            clearInterval(tmInt);
            if(i === q.ok) { 
                if(isT1) sc1++; else sc2++; 
                b.classList.add('correct');
            } else b.classList.add('wrong');
            document.getElementById('sc1').innerText = sc1;
            document.getElementById('sc2').innerText = sc2;
            setTimeout(() => { turn++; nextTurn(); }, 1500);
        };
        area.appendChild(b);
    });
    startTimer();
}

function startTimer() {
    tmLeft = appD.totalTime;
    updateTmUI();
    clearInterval(tmInt);
    tmInt = setInterval(() => {
        if(!isP) {
            tmLeft--; updateTmUI();
            if(tmLeft <= 0) { clearInterval(tmInt); turn++; nextTurn(); }
        }
    }, 1000);
}

function updateTmUI() {
    document.getElementById('timer-text').innerText = tmLeft;
    let offset = 220 - (tmLeft / appD.totalTime) * 220;
    document.getElementById('timer-bar').style.strokeDashoffset = offset;
}

function toggleSettings() { 
    let p = document.getElementById('settings-panel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function switchSlot(n) { loadSl(n); }
function tP() { isP = !isP; document.getElementById('pBtn').innerText = isP ? "▶ استئناف" : "⏸ إيقاف"; }
function finish() {
    confetti();
    document.getElementById('screen-game').innerHTML = `<h1>🏆 الفائز: ${sc1>sc2?appD.t1Name:appD.t2Name}</h1><button onclick="location.reload()">إعادة</button>`;
}

loadSl(1);
</script>
</body>
</html>
